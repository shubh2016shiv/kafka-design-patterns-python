name: quality

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality-gate:
    name: Ruff + Unit Tests (Phased Gate)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff

      - name: Ruff check (phased scope)
        run: ruff check config common producers consumers test --no-cache

      - name: Unit tests
        run: python -m unittest test.producer.test_simple_producer

  debt-visibility:
    name: Full Repo Ruff Debt Report (Non-Blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff

      - name: Full repo Ruff report (non-blocking)
        run: ruff check . --no-cache
